apiVersion: v1
kind: Service
metadata:
  name: config-master-svc
  namespace: staging
  labels:
    app: config-master
    env: staging
spec:
  type: NodePort
  selector:
    app: config-master
    env: staging
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080   # Access via: minikube service config-master-svc -n staging
