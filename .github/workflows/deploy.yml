name: Config-Master CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:          # Allow manual trigger from GitHub UI

# ── Global env ────────────────────────────────────────────────────────────────
env:
  IMAGE_NAME: valsuh/config-master

jobs:
  # ── Job 1: Build & push Docker image ────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to STAGING (automatic) ────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging          # GitHub Environment: no protection rules

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Ensure staging namespace exists
        run: kubectl get namespace staging || kubectl create namespace staging

      - name: Apply staging ConfigMap
        run: kubectl apply -f k8s/staging/configmap.yaml

      - name: Deploy to staging
        run: |
          # Update the image tag so Kubernetes pulls the new image
          kubectl set image deployment/config-master \
            config-master=${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} \
            -n staging \
            || kubectl apply -f k8s/staging/deployment.yaml

      - name: Apply staging Service
        run: kubectl apply -f k8s/staging/service.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/config-master -n staging --timeout=120s

      - name: Staging deploy summary
        run: |
          echo "✅ Staging deployed successfully"
          echo "   Image: ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          kubectl get pods -n staging

  # ── Job 3: Manual Approval gate ─────────────────────────────────────────────
  # This job does nothing itself — the "environment: production" line is what
  # creates the Approve button in the GitHub Actions UI.
  # GitHub pauses execution here until a required reviewer clicks Approve.
  #
  # To enable this: go to your repo → Settings → Environments → production
  #   → add yourself as a Required reviewer.

  # ── Job 4: Deploy to PRODUCTION (after approval) ────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment: production       # GitHub Environment: Required reviewers protection rule

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Ensure production namespace exists
        run: kubectl get namespace production || kubectl create namespace production

      - name: Apply production ConfigMap
        run: kubectl apply -f k8s/production/configmap.yaml

      - name: Deploy to production
        run: |
          kubectl set image deployment/config-master \
            config-master=${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} \
            -n production \
            || kubectl apply -f k8s/production/deployment.yaml

      - name: Apply production Service
        run: kubectl apply -f k8s/production/service.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/config-master -n production --timeout=120s

      - name: Production deploy summary
        run: |
          echo "🚀 Production deployed successfully"
          echo "   Image: ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          kubectl get pods -n production
